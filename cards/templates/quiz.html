{% load static %}

<link rel="stylesheet" href="{% static 'cards/style.css' %}">

<h2>Вопрос {{ number }} из {{ total }}</h2>

<h1>{{ card.spanish_word }}</h1>

{% if card.image %}
<img src="{{ card.image }}" width="200">
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Ответить</button>
</form>
