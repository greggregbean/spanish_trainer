<h2>{{ topic.name }}</h2>

<ul>
    {% for card in cards %}
        <li>
            <b>{{ card.spanish_word }}</b> — {{ card.translation }} <br>

            {% if card.image %}
                <img src="{{ card.image }}" width="150">
            {% endif %}
        </li>
    {% endfor %}
</ul>

<a href="/">Назад</a>
